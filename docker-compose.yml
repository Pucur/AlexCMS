services:
  app:
    container_name: alexcms
    build: .
    ports:
      - "80"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .session
    environment:
      TZ: Europe/Berlin
      DB_HOST: db
      DB_USER: web
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: appdb
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: alexcms-db
    environment:
      TZ: Europe/Berlin #Replace it if you wish
      POSTGRES_USER: web
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: appdb
    volumes:
      - ./sql:/var/lib/postgresql

  caddy:
    container_name: alexcms-caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
